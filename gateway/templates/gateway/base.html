{% load static %}
<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Streamverse Gateway{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'gateway/styles.css' %}">
</head>
<body>
    <canvas id="particles" aria-hidden="true"></canvas>
    <main class="relative z-10 min-h-screen overflow-hidden">
        <section class="mx-auto flex min-h-screen w-full max-w-6xl flex-col justify-center px-5 py-10 sm:px-8">
            {% if messages %}
                <div class="fixed left-1/2 top-5 z-50 w-[calc(100%-2rem)] max-w-xl -translate-x-1/2 space-y-3">
                    {% for message in messages %}
                        <div class="notice {{ message.tags }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
            {% block content %}{% endblock %}
        </section>
    </main>
    <script src="{% static 'gateway/app.js' %}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
