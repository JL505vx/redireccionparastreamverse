{% extends 'gateway/base.html' %}

{% block title %}Redirigiendo{% endblock %}

{% block content %}
<div class="mx-auto w-full max-w-2xl text-center">
    <div class="glass-panel reveal">
        <p class="mb-4 text-sm font-semibold uppercase tracking-[0.25em] text-emerald-200">Acceso verificado</p>
        <h1 class="text-4xl font-extrabold text-white">Listo, {{ user.name }}</h1>
        <p class="mt-4 text-lg leading-8 text-slate-200">
            Tu identidad fue validada. La redireccion continuara automaticamente.
        </p>
        <div class="countdown-ring mx-auto mt-8">
            <span id="countdown">3</span>
        </div>
        <a class="transparent-btn mt-8 inline-flex" href="{{ target_url }}">Ir ahora</a>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    startRedirectCountdown("{{ target_url|escapejs }}");
</script>
{% endblock %}
